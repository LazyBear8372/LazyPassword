# LazyPassword 리버스 프록시 (HTTPS).
# 인증서는 호스트의 /etc/letsencrypt를 컨테이너에 마운트해 사용한다.

# HTTP: HTTPS로 영구 리다이렉트
server {
    listen 80;
    server_name lazypassword.kr www.lazypassword.kr;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name lazypassword.kr www.lazypassword.kr;

    ssl_certificate     /etc/letsencrypt/live/lazypassword.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lazypassword.kr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # 영지식 비밀번호 서비스 — HTTPS 강제(HSTS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 1m;

    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
