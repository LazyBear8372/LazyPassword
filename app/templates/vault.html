{% extends "base.html" %}
{% block title %}볼트 - LazyPassword{% endblock %}
{% block content %}
<div class="vault-bar">
  <h1>내 비밀번호 볼트</h1>
  <button id="logout-btn" class="secondary">로그아웃</button>
</div>

<details>
  <summary id="form-title">새 항목 추가</summary>
  <form id="item-form">
    <input type="hidden" id="item-id">
    <input id="title" placeholder="제목" required>
    <input id="username" placeholder="아이디">
    <input id="password" placeholder="비밀번호">
    <input id="url" placeholder="URL">
    <input id="category" placeholder="카테고리">
    <div class="grid">
      <button type="submit" id="submit-btn">추가</button>
      <button type="button" id="cancel-edit" class="secondary" style="display:none">취소</button>
    </div>
  </form>
</details>
<p id="error" style="color:var(--pico-del-color)"></p>

<input type="search" id="search" placeholder="제목·카테고리로 검색">
<ul id="item-list" class="cards"></ul>

<script src="/static/js/vault.js"></script>
{% endblock %}
