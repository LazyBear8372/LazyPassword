services:
  db:
    image: postgres:16
    container_name: lazypassword-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    container_name: lazypassword-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      # DB host는 컨테이너 네트워크의 서비스명 'db' (로컬 .env의 localhost를 override)
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      SESSION_HTTPS_ONLY: ${SESSION_HTTPS_ONLY:-false}
      # nginx 뒤에 있으므로 프록시 헤더(X-Forwarded-*)를 신뢰
      FORWARDED_ALLOW_IPS: "*"
    restart: unless-stopped

  nginx:
    image: nginx:1.27
    container_name: lazypassword-nginx
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped

volumes:
  pgdata:
